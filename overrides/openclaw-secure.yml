# OpenClaw secure override — bind to localhost only.
# Use: docker compose -f docker-compose.yml -f overrides/openclaw-secure.yml up -d
# Access via Tailscale Serve pointing at 127.0.0.1:18789

name: ai-toolkit

services:
  dashboard:
    environment:
      # Secure override maps gateway to 18789:18789 — dashboard probes must use container port 18789.
      OPENCLAW_GATEWAY_INTERNAL_PORT: "18789"

  openclaw-gateway:
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:18789"]
