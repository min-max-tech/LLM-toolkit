name: ai-toolkit

# All services start by default. Run: docker compose up -d
services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.18.0}
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Host port not exposed by default (backend-only). To expose for Cursor/direct use: -f overrides/ollama-expose.yml
    volumes:
      - ${BASE_PATH:-.}/models/ollama:/root/.ollama
    healthcheck:
      # Image has no curl/wget; use ollama CLI to probe the server
      test: ["CMD", "ollama", "list"]
      start_period: 120s
      interval: 15s
      timeout: 10s
      retries: 5
    # GPU config: overridden by overrides/compute.yml (run scripts/detect_hardware.py)
    # Pin digest: OLLAMA_IMAGE=ollama/ollama:0.18.0
    networks:
      - backend

  model-gateway:
    build: ./model-gateway
    image: ai-toolkit-model-gateway:latest
    pull_policy: build
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    depends_on:
      ollama:
        condition: service_healthy
      dashboard:
        condition: service_started
    environment:
      - OLLAMA_URL=http://ollama:11434
      - VLLM_URL=${VLLM_URL:-}
      - DEFAULT_PROVIDER=ollama
      - DASHBOARD_URL=http://dashboard:8080
      - THROUGHPUT_RECORD_TOKEN=${THROUGHPUT_RECORD_TOKEN:-}
      - MODEL_CACHE_TTL_SEC=${MODEL_CACHE_TTL_SEC:-60}
      # Cap Ollama KV cache. Ollama pre-allocates the full model max (often 128K+)
      # even for short prompts, killing CPU throughput. 16384 tokens covers most
      # conversations; OpenClaw compaction flushes at ~15K tokens anyway.
      # Set to 0 to use Ollama's default (max context, slow on CPU).
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-16384}
      # Local model used when Claude Code sends a "claude-*" model name
      - CLAUDE_CODE_LOCAL_MODEL=${CLAUDE_CODE_LOCAL_MODEL:-}
    ports:
      - "${MODEL_GATEWAY_PORT:-11435}:11435"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11435/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend

  ops-controller:
    build: ./ops-controller
    image: ai-toolkit-ops-controller:latest
    pull_policy: build
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      - COMPOSE_PROJECT_DIR=/workspace
      - OPS_CONTROLLER_TOKEN=${OPS_CONTROLLER_TOKEN:-}
      - AUDIT_LOG_PATH=/data/audit.log
      - BASE_PATH=${BASE_PATH:-.}
      - DATA_PATH=${DATA_PATH:-${BASE_PATH:-.}/data}
      - COMPOSE_FILE=${COMPOSE_FILE:-docker-compose.yml}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - COMFYUI_MODELS_DIR=/models/comfyui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BASE_PATH:-.}:/workspace
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/ops-controller:/data
      - ${BASE_PATH:-.}/models/comfyui:/models/comfyui
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # No host port - dashboard calls internally. Add "9000:9000" for debugging.
    networks:
      - backend

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    user: "1000:1000"
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODELS_DIR=/models
      - SCRIPTS_DIR=/scripts
      - MCP_CONFIG_PATH=/mcp-config/servers.txt
      - MCP_GATEWAY_URL=http://mcp-gateway:8811
      - MCP_GATEWAY_SERVERS=${MCP_GATEWAY_SERVERS:-duckduckgo}
      - OPS_CONTROLLER_URL=http://ops-controller:9000
      - OPS_CONTROLLER_TOKEN=${OPS_CONTROLLER_TOKEN:-}
      - DASHBOARD_AUTH_TOKEN=${DASHBOARD_AUTH_TOKEN:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - THROUGHPUT_RECORD_TOKEN=${THROUGHPUT_RECORD_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - COMFYUI_URL=http://comfyui:8188
      # OpenClaw model management: dashboard reads/writes openclaw.json to sync models
      - MODEL_GATEWAY_URL=http://model-gateway:11435
      - OPENCLAW_CONFIG_PATH=/openclaw-config/openclaw.json
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-6680}
      - OPENCLAW_UI_PORT=${OPENCLAW_UI_PORT:-6682}
      - DASHBOARD_DATA_PATH=/data/dashboard
    volumes:
      - ${BASE_PATH:-.}/models/comfyui:/models
      - ${BASE_PATH:-.}/scripts:/scripts:ro
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/dashboard:/data/dashboard
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/mcp:/mcp-config
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/openclaw-config
    networks:
      - frontend
      - backend

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.8.4}
    restart: unless-stopped
    depends_on:
      - ollama
      - model-gateway
      - qdrant
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Route all model requests through the gateway (unified provider)
      - OLLAMA_BASE_URL=
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE:-http://model-gateway:11435/v1}
      - OPENAI_API_KEY=ollama-local
      # Auth: False = single-user local / Tailscale use.
      - WEBUI_AUTH=${WEBUI_AUTH:-False}
      # Default model shown in chat UI (updated by dashboard "Set Default" control)
      - DEFAULT_MODELS=${DEFAULT_MODEL:-}
      # RAG: use Qdrant for vector storage
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/open-webui:/app/backend/data
    networks:
      - frontend
      - backend

  model-puller:
    profiles: [models]
    image: curlimages/curl:8.10.1
    depends_on:
      - ollama
    restart: "no"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODELS=${MODELS:-deepseek-r1:7b,deepseek-coder:6.7b,nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "Waiting for Ollama ..."
        until curl -fsS "$$OLLAMA_URL/api/version" >/dev/null; do sleep 2; done
        echo "Pulling: $$MODELS"
        IFS=','; for m in $$MODELS; do
          m="$$(echo "$$m" | tr -d ' ')"
          [ -z "$$m" ] && continue
          echo "==> $$m"
          curl -fsS "$$OLLAMA_URL/api/pull" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$$m\",\"stream\":false}"
        done
        echo "Done."
    networks:
      - backend

  comfyui-model-puller:
    profiles: [comfyui-models]
    image: python:3.12.8-slim
    restart: "no"
    user: "0:0"
    environment:
      - MODELS_DIR=/models
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${BASE_PATH:-.}/models/comfyui:/models
      - ${BASE_PATH:-.}/scripts:/scripts:ro
    # chmod first — ensures write access on Docker Desktop/Windows bind mounts
    command: ["sh", "-c", "chmod -R a+w /models && python3 /scripts/comfyui/pull_comfyui_models.py"]
    networks:
      - frontend

  comfyui:
    image: ${COMFYUI_IMAGE:-yanwk/comfyui-boot:cpu}
    container_name: comfyui
    restart: unless-stopped
    # Backend network so MCP gateway-spawned comfyui container can reach it
    # ComfyUI: run scripts/detect_hardware.py to auto-configure GPU (NVIDIA/AMD/Intel) or CPU
    ports:
      - "8188:8188"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - CLI_ARGS=--cpu
      - PYTORCH_CUDA_ALLOC_CONF=
    volumes:
      - ${BASE_PATH:-.}/data/comfyui-storage:/root
      - ${BASE_PATH:-.}/models/comfyui:/root/ComfyUI/models
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/comfyui-output:/root/ComfyUI/output
    networks:
      - frontend
      - backend

  # Build ComfyUI MCP image for gateway-spawned containers (exits immediately after build)
  comfyui-mcp-image:
    build: ./comfyui-mcp
    image: ai-toolkit-comfyui-mcp:latest
    pull_policy: build
    restart: "no"
    command: ["true"]

  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:2.10.2}
    restart: unless-stopped
    # Run as non-root (n8n image uses node user; 1000:1000 matches typical node uid)
    user: "1000:1000"
    depends_on:
      model-gateway:
        condition: service_healthy
      mcp-gateway:
        condition: service_started
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      # Route all model traffic through Model Gateway (dashboard tracking, unified provider)
      - OLLAMA_HOST=http://model-gateway:11435
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE:-http://model-gateway:11435/v1}
      - OPENAI_API_KEY=ollama-local
      # OAuth callbacks + inbound webhooks require a public URL.
      # Recommended: tailscale funnel --set-path /rest/oauth2-credential/callback 5678
      #              tailscale funnel --set-path /webhook 5678
      # Then set N8N_WEBHOOK_URL=https://your-machine.your-tailnet.ts.net in .env
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_EDITOR_BASE_URL=${N8N_WEBHOOK_URL:-}
      # Only the callback and webhook paths need to be reachable without a session cookie
      - N8N_AUTH_EXCLUDE_ENDPOINTS=rest/oauth2-credential/callback,webhook
      - N8N_SECURE_COOKIE=false
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/n8n-data:/home/node/.n8n
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/n8n-files:/files
    networks:
      - frontend
      - backend

  mcp-gateway:
    build: ./mcp
    image: ai-toolkit-mcp-gateway:latest
    pull_policy: build
    container_name: mcp-gateway
    restart: unless-stopped
    depends_on:
      comfyui-mcp-image:
        condition: service_completed_successfully
    environment:
      - MCP_CONFIG_FILE=/mcp-config/servers.txt
      - MCP_GATEWAY_PORT=8811
      # MCP server API keys — set these in the root .env file
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      # n8n MCP server (mcp/n8n) — for workflow tools when n8n API key is set
      - N8N_API_URL=${N8N_API_URL:-http://n8n:5678}
      - N8N_API_KEY=${N8N_API_KEY:-}
      # ComfyUI MCP (custom registry) — passed to spawned comfyui container
      - COMFYUI_URL=http://comfyui:8188
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/mcp:/mcp-config
    # No host port by default (backend-only per PRD M6). For external MCP access: -f overrides/mcp-expose.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8811/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  openclaw-workspace-sync:
    image: alpine:3
    restart: "no"
    volumes:
      - ${BASE_PATH:-.}/openclaw/workspace:/templates:ro
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/workspace
    entrypoint: ["/bin/sh", "-c", "cp -f /templates/SOUL.md /templates/AGENTS.md /templates/TOOLS.md /workspace/ 2>/dev/null || true"]
    networks:
      - frontend

  openclaw-config-sync:
    image: python:3.12-alpine
    restart: "no"
    depends_on:
      model-gateway:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - MODEL_GATEWAY_URL=http://model-gateway:11435
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/config
      - ${BASE_PATH:-.}/openclaw/scripts:/scripts:ro
    entrypoint: ["python3", "/scripts/merge_gateway_config.py"]
    networks:
      - frontend

  # Install MCP bridge plugin (optional; npm package v0.1.0 has manifest bug — we use
  # plugin-config instead). Run manually: docker compose run --rm openclaw-plugin-install
  openclaw-plugin-install:
    image: ${OPENCLAW_IMAGE:-ghcr.io/phioranex/openclaw-docker:latest}
    restart: "no"
    profiles:
      - openclaw-setup
    depends_on:
      openclaw-config-sync:
        condition: service_completed_successfully
    environment:
      HOME: /home/node
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
    command: ["plugins", "install", "openclaw-mcp-bridge"]
    networks:
      - frontend

  # Ensure MCP plugin is installed (npm package + manifest) and config entry exists.
  # Uses named volume for proper Linux permissions (Windows bind mounts force 0777).
  openclaw-plugin-config:
    image: node:22-alpine
    restart: "no"
    depends_on:
      openclaw-config-sync:
        condition: service_completed_successfully
      mcp-gateway:
        condition: service_started
    environment:
      - MCP_GATEWAY_URL=http://mcp-gateway:${MCP_GATEWAY_PORT:-8811}/mcp
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/config
      - openclaw-extensions:/extensions
      - ${BASE_PATH:-.}/openclaw/scripts:/scripts:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        PLUGIN_DIR=/extensions/openclaw-mcp-bridge
        MANIFEST="$$PLUGIN_DIR/openclaw.plugin.json"
        MCP_URL="$${MCP_GATEWAY_URL:-http://mcp-gateway:8811/mcp}"

        # Install npm package if dist/ is missing
        if [ ! -f "$$PLUGIN_DIR/dist/index.js" ]; then
          echo "Installing openclaw-mcp-bridge npm package..."
          apk add --no-cache git >/dev/null 2>&1 || true
          cd /tmp
          npm pack openclaw-mcp-bridge 2>/dev/null
          tar xzf openclaw-mcp-bridge-*.tgz
          rm -rf "$$PLUGIN_DIR"
          mkdir -p "$$PLUGIN_DIR"
          cp -r package/* "$$PLUGIN_DIR/"
          cd "$$PLUGIN_DIR"
          npm install --omit=dev --ignore-scripts 2>&1
          echo "Plugin package installed."
        fi

        # Create/update manifest (npm package v0.1.0 omits it)
        cat > "$$MANIFEST" <<'MEOF'
        {
          "id": "openclaw-mcp-bridge",
          "name": "MCP Client",
          "description": "Bridges MCP servers as native OpenClaw tools via streamable-http.",
          "extensions": ["./dist/index.js"],
          "slots": ["tool"],
          "skills": ["./skills"],
          "configSchema": {
            "type": "object",
            "additionalProperties": false,
            "properties": {
              "servers": {
                "type": "object",
                "additionalProperties": {
                  "type": "object",
                  "properties": {
                    "url": { "type": "string" },
                    "enabled": { "type": "boolean" },
                    "apiKey": { "type": "string" },
                    "toolPrefix": { "type": "string" }
                  },
                  "required": ["url"]
                }
              },
              "debug": { "type": "boolean" }
            }
          }
        }
        MEOF
        chmod 644 "$$MANIFEST"
        echo "Plugin manifest ready."

        # Add plugin entry to openclaw.json if missing
        CONFIG=/config/openclaw.json
        if [ -f "$$CONFIG" ]; then
          if ! node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('$$CONFIG','utf-8'));
            const p = d.plugins = d.plugins || {};
            const e = p.entries = p.entries || {};
            if (e['openclaw-mcp-bridge']) { process.exit(0); }
            e['openclaw-mcp-bridge'] = {enabled:true,config:{servers:{gateway:{url:'$$MCP_URL'}},debug:false}};
            p.enabled = true;
            fs.writeFileSync('$$CONFIG', JSON.stringify(d,null,2));
            console.log('add_mcp_plugin_config: added openclaw-mcp-bridge to plugins.entries');
          "; then
            echo "Warning: could not update openclaw.json plugin entry"
          fi
        fi
    networks:
      - frontend
      - backend

  openclaw-gateway:
    # Pin to digest when available; only :latest published upstream
    image: ${OPENCLAW_IMAGE:-ghcr.io/phioranex/openclaw-docker:latest}
    container_name: openclaw-gateway
    depends_on:
      model-gateway:
        condition: service_started
      mcp-gateway:
        condition: service_started
      openclaw-workspace-sync:
        condition: service_completed_successfully
      openclaw-config-sync:
        condition: service_completed_successfully
      openclaw-plugin-config:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      OPENCLAW_SKIP_SERVICE_CHECK: "true"
      OPENCLAW_GATEWAY_BIND: "lan"
      DISCORD_BOT_TOKEN: ${DISCORD_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/home/node/.openclaw/workspace
      # Named volume for extensions — Windows bind mounts force 0777 which
      # OpenClaw's safe-open rejects. A named volume has proper Linux perms.
      - openclaw-extensions:/home/node/.openclaw/extensions
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-6680}:6680"
      - "${OPENCLAW_BRIDGE_PORT:-6681}:6681"
      # UI port maps to socat proxy (6685) which forwards to OpenClaw's loopback-only UI (127.0.0.1:6682)
      - "${OPENCLAW_UI_PORT:-6682}:6685"
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:${OPENCLAW_GATEWAY_PORT:-6680}"]
      # OpenClaw binds to OPENCLAW_GATEWAY_PORT internally
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["gateway", "--allow-unconfigured"]
    networks:
      - frontend
      - backend

  # Socat proxy: OpenClaw's browser UI binds to 127.0.0.1:6682 (loopback-only) inside the container,
  # so Docker port forwarding can't reach it. This sidecar shares the network namespace and bridges
  # 0.0.0.0:6685 -> 127.0.0.1:6682, allowing the openclaw-gateway port mapping above to work.
  openclaw-ui-proxy:
    image: alpine/socat:1.8.0.0
    network_mode: "service:openclaw-gateway"
    command: TCP-LISTEN:6685,fork,reuseaddr TCP:127.0.0.1:6682
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  openclaw-cli:
    profiles: [openclaw-cli]
    image: ${OPENCLAW_IMAGE:-ghcr.io/phioranex/openclaw-docker:latest}
    depends_on:
      - ollama
      - openclaw-gateway
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      BROWSER: echo
      OLLAMA_API_KEY: "ollama-local"
      OLLAMA_BASE_URL: "http://ollama:11434"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "/app/dist/index.js"]
    networks:
      - frontend

  # --- RAG ---

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  rag-ingestion:
    profiles: [rag]
    build: ./rag-ingestion
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/rag-ingestion.heartbeat"]
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - MODEL_GATEWAY_URL=http://model-gateway:11435
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${RAG_COLLECTION:-documents}
      - WATCH_DIR=/watch
      - CHUNK_SIZE=${RAG_CHUNK_SIZE:-400}
      - CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-50}
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/rag-input:/watch
    depends_on:
      - model-gateway
      - qdrant
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

volumes:
  openclaw-extensions:

networks:
  frontend:
    name: ai-toolkit-frontend
  backend:
    name: ai-toolkit-backend
    # internal: false required for Ollama to pull models from registry.ollama.ai.
    # Set internal: true for air-gapped security (model pulls will fail).
    internal: false

