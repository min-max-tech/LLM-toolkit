name: ordo-ai-stack

# All services start by default. Run: docker compose up -d
services:
  llamacpp:
    image: ${LLAMACPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    restart: unless-stopped
    platform: linux/amd64
    entrypoint: ["/bin/sh", "/llamacpp-scripts/run-llama-server.sh"]
    environment:
      - LLAMACPP_MODEL=${LLAMACPP_MODEL:-model.gguf}
      - LLAMACPP_CTX_SIZE=${LLAMACPP_CTX_SIZE:-262144}
      - LLAMACPP_PARALLEL=${LLAMACPP_PARALLEL:-1}
      - LLAMACPP_ROPE_SCALING=${LLAMACPP_ROPE_SCALING:-none}
      - LLAMACPP_ROPE_SCALE=${LLAMACPP_ROPE_SCALE:-1}
      - LLAMACPP_YARN_ORIG_CTX=${LLAMACPP_YARN_ORIG_CTX:-0}
      - LLAMACPP_OVERRIDE_KV=${LLAMACPP_OVERRIDE_KV:-}
      - LLAMACPP_GPU_LAYERS=${LLAMACPP_GPU_LAYERS:--1}
      - LLAMACPP_FLASH_ATTN=${LLAMACPP_FLASH_ATTN:-auto}
      - LLAMACPP_ENABLE_KV_CACHE_QUANTIZATION=${LLAMACPP_ENABLE_KV_CACHE_QUANTIZATION:-0}
      - LLAMACPP_KV_CACHE_TYPE_K=${LLAMACPP_KV_CACHE_TYPE_K:-q4_0}
      - LLAMACPP_KV_CACHE_TYPE_V=${LLAMACPP_KV_CACHE_TYPE_V:-q4_0}
      - LLAMACPP_EXTRA_ARGS=${LLAMACPP_EXTRA_ARGS:-}
    volumes:
      - ${BASE_PATH:-.}/models/gguf:/models:ro
      - ${BASE_PATH:-.}/scripts/llamacpp:/llamacpp-scripts:ro
    # Large GGUFs can take many minutes before /health returns 200; 503 during load fails curl -f.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      start_period: 1800s
      interval: 15s
      timeout: 10s
      retries: 40
    # GPU config: overridden by overrides/compute.yml (run scripts/detect_hardware.py)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # Use CUDA image so linux/amd64 is available (plain :server manifest can resolve to arm64 on Docker Desktop).
  llamacpp-embed:
    image: ${LLAMACPP_EMBED_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    restart: unless-stopped
    platform: linux/amd64
    command: >
      --host 0.0.0.0 --port 8080
      --model /models/${LLAMACPP_EMBED_MODEL:-nomic-embed-text-v1.5.Q4_K_M.gguf}
      --ctx-size 8192 --embeddings
    volumes:
      - ${BASE_PATH:-.}/models/gguf:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      start_period: 60s
      interval: 15s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  model-gateway:
    build: ./model-gateway
    image: ordo-ai-stack-model-gateway:latest
    pull_policy: build
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    depends_on:
      llamacpp:
        condition: service_healthy
      llamacpp-embed:
        condition: service_healthy
      dashboard:
        condition: service_started
    environment:
      - LLAMACPP_URL=http://llamacpp:8080
      - LLAMACPP_EMBED_URL=http://llamacpp-embed:8080
      - LLAMACPP_MODEL=${LLAMACPP_MODEL:-model.gguf}
      - LLAMACPP_EMBED_MODEL=${LLAMACPP_EMBED_MODEL:-nomic-embed-text-v1.5.Q4_K_M.gguf}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-local}
      - LLAMACPP_CTX_SIZE=${LLAMACPP_CTX_SIZE:-262144}
      # Local model used when a Claude-compatible client sends a "claude-*" model name
      - CLAUDE_CODE_LOCAL_MODEL=${CLAUDE_CODE_LOCAL_MODEL:-}
    ports:
      - "${MODEL_GATEWAY_PORT:-11435}:11435"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, urllib.request; req = urllib.request.Request('http://localhost:11435/v1/models', headers={'Authorization': 'Bearer ' + os.environ.get('LITELLM_MASTER_KEY', 'local')}); urllib.request.urlopen(req)\""]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend

  ops-controller:
    build: ./ops-controller
    image: ordo-ai-stack-ops-controller:latest
    pull_policy: build
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      - COMPOSE_PROJECT_DIR=/workspace
      - OPS_CONTROLLER_TOKEN=${OPS_CONTROLLER_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - AUDIT_LOG_PATH=/data/audit.log
      - BASE_PATH=${BASE_PATH:-.}
      - DATA_PATH=${DATA_PATH:-${BASE_PATH:-.}/data}
      - COMPOSE_FILE=${COMPOSE_FILE:-docker-compose.yml}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - COMFYUI_MODELS_DIR=/models/comfyui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BASE_PATH:-.}:/workspace
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/ops-controller:/data
      - ${BASE_PATH:-.}/models/comfyui:/models/comfyui
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # No host port - dashboard calls internally. Add "9000:9000" for debugging.
    networks:
      - backend

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    # Image entrypoint runs as root briefly to chmod bind-mounted /models, then gosu appuser.
    # Do not set user: here or ComfyUI pulls fail with Permission denied on /models.
    # gosu needs SETUID/SETGID; no-new-privileges breaks user switching (EPERM).
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    cap_add:
      - SETUID
      - SETGID
    depends_on:
      llamacpp:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - LLAMACPP_URL=http://llamacpp:8080
      - MODEL_GATEWAY_API_KEY=${LITELLM_MASTER_KEY:-local}
      - MODELS_DIR=/models
      - GGUF_MODELS_DIR=/gguf-models
      - SCRIPTS_DIR=/scripts
      - MCP_CONFIG_PATH=/mcp-config/servers.txt
      - MCP_GATEWAY_URL=http://mcp-gateway:8811
      # Must include comfyui so mcp-gateway loads ComfyUI tools (registry-custom.yaml). Matches data/mcp/servers.txt default.
      - MCP_GATEWAY_SERVERS=${MCP_GATEWAY_SERVERS:-duckduckgo,n8n,tavily,comfyui,orchestration}
      # Read-only: ComfyUI user workflows (host: data/comfyui-storage/ComfyUI/user/default/workflows)
      - COMFYUI_WORKFLOWS_DIR=/comfyui-workflows
      - OPS_CONTROLLER_URL=http://ops-controller:9000
      - OPS_CONTROLLER_TOKEN=${OPS_CONTROLLER_TOKEN:-}
      - DASHBOARD_AUTH_TOKEN=${DASHBOARD_AUTH_TOKEN:-}
      - THROUGHPUT_RECORD_TOKEN=${THROUGHPUT_RECORD_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - COMFYUI_URL=http://comfyui:8188
      # OpenClaw model management: dashboard reads/writes openclaw.json to sync models
      - MODEL_GATEWAY_URL=http://model-gateway:11435
      # OpenClaw contextWindow in synced models. Default matches llama.cpp --ctx-size; override only if
      # you intentionally want OpenClaw to compact earlier than the server hard cap.
      - LLAMACPP_CTX_SIZE=${LLAMACPP_CTX_SIZE:-262144}
      - OPENCLAW_CONTEXT_WINDOW=${OPENCLAW_CONTEXT_WINDOW:-${LLAMACPP_CTX_SIZE:-262144}}
      - OPENCLAW_CONFIG_PATH=/openclaw-config/openclaw.json
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-6680}
      # Must match container listen port (see openclaw-gateway ports … :6680); not the host-mapped port.
      - OPENCLAW_GATEWAY_INTERNAL_PORT=${OPENCLAW_GATEWAY_INTERNAL_PORT:-6680}
      - OPENCLAW_UI_PORT=${OPENCLAW_UI_PORT:-6682}
      - DASHBOARD_DATA_PATH=/data/dashboard
      # n8n webhook for publish_enqueue (or pass per-request); n8n owns retries/OAuth
      - N8N_PUBLISH_WEBHOOK_URL=${N8N_PUBLISH_WEBHOOK_URL:-}
      - COMFYUI_OUTPUT_DIR=/comfyui-output
    volumes:
      - ${BASE_PATH:-.}/models/comfyui:/models
      - ${BASE_PATH:-.}/models/gguf:/gguf-models
      - ${BASE_PATH:-.}/scripts:/scripts:ro
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/dashboard:/data/dashboard
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/mcp:/mcp-config
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/openclaw-config
      - ${BASE_PATH:-.}/data/comfyui-storage/ComfyUI/user/default/workflows:/comfyui-workflows:ro
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/comfyui-output:/comfyui-output:ro
    networks:
      - frontend
      - backend

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/worker.heartbeat ] && [ $(($(date +%s) - $(cat /tmp/worker.heartbeat))) -lt 120 ]"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      dashboard:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    environment:
      - DASHBOARD_DATA_PATH=/data/dashboard
      - COMFYUI_URL=http://comfyui:8188
      - COMFYUI_WORKFLOWS_DIR=/comfyui-workflows
      - COMFYUI_OUTPUT_DIR=/comfyui-output
      - WORKER_POLL_INTERVAL_SEC=${WORKER_POLL_INTERVAL_SEC:-0.5}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
      - WORKER_SCHEDULE_CHECK_SEC=30
      - WORKER_MAX_JOB_RETRIES=2
      - WORKER_PUBLISH_MAX_ATTEMPTS=5
      - N8N_PUBLISH_WEBHOOK_URL=${N8N_PUBLISH_WEBHOOK_URL:-}
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/dashboard:/data/dashboard
      - ${BASE_PATH:-.}/data/comfyui-storage/ComfyUI/user/default/workflows:/comfyui-workflows:ro
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/comfyui-output:/comfyui-output:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.8.4}
    restart: unless-stopped
    depends_on:
      llamacpp:
        condition: service_healthy
      model-gateway:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Route all model requests through the gateway (unified provider)
      - OLLAMA_BASE_URL=
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE:-http://model-gateway:11435/v1}
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-local}
      # Auth: False = single-user local / Tailscale use.
      - WEBUI_AUTH=${WEBUI_AUTH:-False}
      # Default model shown in chat UI. Dashboard writes OPEN_WEBUI_DEFAULT_MODEL to prefer the low-context :chat alias.
      - DEFAULT_MODELS=${OPEN_WEBUI_DEFAULT_MODEL:-${DEFAULT_MODEL:-}}
      # RAG: use Qdrant for vector storage
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - QDRANT_URL=http://qdrant:6333
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://model-gateway:11435/v1
      - RAG_OPENAI_API_KEY=${LITELLM_MASTER_KEY:-local}
      - RAG_EMBEDDING_MODEL=${EMBED_MODEL:-${LLAMACPP_EMBED_MODEL:-nomic-embed-text-v1.5.Q4_K_M.gguf}}
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/open-webui:/app/backend/data
    networks:
      - frontend
      - backend

  gguf-puller:
    profiles: [models]
    image: python:3.12-slim
    restart: "no"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - GGUF_MODELS=${GGUF_MODELS:-}
    volumes:
      - ${BASE_PATH:-.}/models/gguf:/models
      - ${BASE_PATH:-.}/scripts:/scripts:ro
    command: ["sh", "-c", "pip install -q huggingface_hub && python3 /scripts/pull_gguf_models.py"]
    networks:
      - frontend

  comfyui-model-puller:
    profiles: [comfyui-models]
    image: python:3.12.8-slim
    restart: "no"
    user: "0:0"
    environment:
      - MODELS_DIR=/models
      - HF_TOKEN=${HF_TOKEN:-}
      - CIVITAI_TOKEN=${CIVITAI_TOKEN:-}
      # Host: $env:COMFYUI_PACKS="flux1-dev-gguf" (PowerShell) — forwarded into the container
      - COMFYUI_PACKS=${COMFYUI_PACKS:-}
      - COMFYUI_QUANT=${COMFYUI_QUANT:-}
    volumes:
      - ${BASE_PATH:-.}/models/comfyui:/models
      - ${BASE_PATH:-.}/scripts:/scripts:ro
    # chmod first — ensures write access on Docker Desktop/Windows bind mounts
    command: ["sh", "-c", "chmod -R a+w /models && python3 /scripts/comfyui/pull_comfyui_models.py"]
    networks:
      - frontend

  # Ensures ComfyUI-Manager is cloned before ComfyUI starts. Safe to re-run — skips if already present.
  comfyui-manager-setup:
    image: alpine:3.21
    restart: "no"
    volumes:
      - ${BASE_PATH:-.}/data/comfyui-storage:/root
    command:
      - sh
      - -c
      - |
        set -eu
        apk add --no-cache git >/dev/null 2>&1
        TARGET=/root/ComfyUI/custom_nodes/ComfyUI-Manager
        if [ ! -d "$$TARGET/.git" ]; then
          echo "Cloning ComfyUI-Manager..."
          mkdir -p /root/ComfyUI/custom_nodes
          git clone --depth=1 https://github.com/Comfy-Org/ComfyUI-Manager.git "$$TARGET"
          echo "ComfyUI-Manager installed."
        else
          echo "ComfyUI-Manager already present, skipping."
        fi

  comfyui:
    image: ${COMFYUI_IMAGE:-yanwk/comfyui-boot:cpu}
    # No fixed container_name — avoids "name already in use" when another project
    # owns `comfyui`; Docker DNS still resolves the service name `comfyui` on this network.
    restart: unless-stopped
    depends_on:
      comfyui-manager-setup:
        condition: service_completed_successfully
    # Backend network so MCP gateway-spawned comfyui container can reach it
    # ComfyUI: run scripts/detect_hardware.py to auto-configure GPU (NVIDIA/AMD/Intel) or CPU
    ports:
      - "8188:8188"
    # Custom nodes + ComfyRegistry can take several minutes before :8188 serves; short grace marks healthy deps as failed.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      start_period: 420s
      interval: 20s
      timeout: 15s
      retries: 12
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # --enable-manager: ComfyUI-Manager (node installs, model UI) — see docs.comfy.org/manager/install
      # Override via COMFYUI_CLI_ARGS in .env (GPU defaults in overrides/compute.yml include --normalvram)
      - CLI_ARGS=${COMFYUI_CLI_ARGS:---cpu --enable-manager}
      - PYTORCH_CUDA_ALLOC_CONF=
      # Hugging Face downloads (gated models) from Manager or built-in fetchers
      - HF_TOKEN=${HF_TOKEN:-}
      # ComfyUI-Manager: GitHub API rate limits for custom node installs (optional; same token as GitHub MCP)
      - GITHUB_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    volumes:
      - ${BASE_PATH:-.}/data/comfyui-storage:/root
      - ${BASE_PATH:-.}/models/comfyui:/root/ComfyUI/models
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/comfyui-output:/root/ComfyUI/output
    networks:
      - frontend
      - backend

  # Build ComfyUI MCP image for gateway-spawned containers (exits immediately after build)
  comfyui-mcp-image:
    build: ./comfyui-mcp
    image: ordo-ai-stack-comfyui-mcp:latest
    pull_policy: build
    restart: "no"
    command: ["true"]

  # Stable orchestration MCP (fixed verbs → dashboard HTTP). Optional build for gateway catalog.
  orchestration-mcp-image:
    build: ./orchestration-mcp
    image: ordo-ai-stack-orchestration-mcp:latest
    pull_policy: build
    restart: "no"
    command: ["true"]

  # Long-running ComfyUI MCP (same image as gateway-spawned). OpenClaw uses **mcp-gateway:8811** only — see TOOLS.md.
  comfyui-mcp:
    image: ordo-ai-stack-comfyui-mcp:latest
    pull_policy: build
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1',9000),2); s.close()\""]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      comfyui:
        condition: service_healthy
    command: ["python", "server.py"]
    environment:
      - COMFYUI_URL=http://comfyui:8188
      - COMFY_MCP_WORKFLOW_DIR=/workflows
      # Host: data/comfyui-storage/ComfyUI/user/default/workflows (seeded API graphs under mcp-api/)
      # When the agent omits workflow_id but sends prompt/width/etc. at top level, use this workflow id (path under workflows dir).
      - COMFY_MCP_DEFAULT_WORKFLOW_ID=${COMFY_MCP_DEFAULT_WORKFLOW_ID:-mcp-api/generate_image}
      # Require explicit workflow_id for autonomous runs (no silent default) — set to 1 to allow legacy default.
      - COMFY_MCP_ALLOW_DEFAULT_WORKFLOW_ID=${COMFY_MCP_ALLOW_DEFAULT_WORKFLOW_ID:-0}
      - COMFY_MCP_DEFAULT_MODEL=${COMFY_MCP_DEFAULT_MODEL:-flux1-schnell-fp8.safetensors}
      - OPS_CONTROLLER_URL=http://ops-controller:9000
      - OPS_CONTROLLER_TOKEN=${OPS_CONTROLLER_TOKEN:-}
    volumes:
      # Same host tree as ComfyUI user/default/workflows. API-format JSON for /prompt; UI exports are listed but cannot run via MCP.
      - ${BASE_PATH:-.}/data/comfyui-storage/ComfyUI/user/default/workflows:/workflows:ro
    networks:
      - backend

  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:2.10.2}
    restart: unless-stopped
    # Run as non-root (n8n image uses node user; 1000:1000 matches typical node uid)
    user: "1000:1000"
    depends_on:
      model-gateway:
        condition: service_healthy
      mcp-gateway:
        condition: service_started
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:5678/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      # Route all model traffic through Model Gateway (dashboard tracking, unified provider)
      - OLLAMA_HOST=http://model-gateway:11435
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE:-http://model-gateway:11435/v1}
      - OPENAI_API_KEY=local
      # OAuth callbacks + inbound webhooks require a public URL.
      # Recommended: tailscale funnel --set-path /rest/oauth2-credential/callback 5678
      #              tailscale funnel --set-path /webhook 5678
      # Then set N8N_WEBHOOK_URL=https://your-machine.your-tailnet.ts.net in .env
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_EDITOR_BASE_URL=${N8N_WEBHOOK_URL:-}
      # Only the callback and webhook paths need to be reachable without a session cookie
      - N8N_AUTH_EXCLUDE_ENDPOINTS=rest/oauth2-credential/callback,webhook
      - N8N_SECURE_COOKIE=false
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/n8n-data:/home/node/.n8n
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/n8n-files:/files
    networks:
      - frontend
      - backend

  mcp-gateway:
    build: ./mcp
    image: ordo-ai-stack-mcp-gateway:latest
    pull_policy: build
    # No fixed container_name — avoids conflicts when another stack already uses `mcp-gateway`.
    restart: unless-stopped
    depends_on:
      comfyui-mcp-image:
        # Build-only container; failure here means ComfyUI MCP won't work but other MCPs should still start
        condition: service_completed_successfully
        required: false
      orchestration-mcp-image:
        condition: service_completed_successfully
        required: false
    environment:
      - MCP_CONFIG_FILE=/mcp-config/servers.txt
      - MCP_GATEWAY_PORT=8811
      # Set to 1 for docker/mcp-gateway --verbose (see TROUBLESHOOTING — ComfyUI tools missing)
      - MCP_GATEWAY_VERBOSE=${MCP_GATEWAY_VERBOSE:-0}
      # MCP server API keys — set these in the root .env file
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      # n8n MCP server (mcp/n8n) — for workflow tools when n8n API key is set
      - N8N_API_URL=${N8N_API_URL:-http://n8n:5678}
      - N8N_API_KEY=${N8N_API_KEY:-}
      # ComfyUI MCP (custom registry) — passed to spawned comfyui container
      - COMFYUI_URL=http://comfyui:8188
      - COMFY_MCP_DEFAULT_MODEL=${COMFY_MCP_DEFAULT_MODEL:-flux1-schnell-fp8.safetensors}
      - OPS_CONTROLLER_URL=http://ops-controller:9000
      - OPS_CONTROLLER_TOKEN=${OPS_CONTROLLER_TOKEN:-}
      # Injected into registry-custom.yaml for orchestration MCP (dashboard Bearer)
      - DASHBOARD_AUTH_TOKEN=${DASHBOARD_AUTH_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/mcp:/mcp-config
    # Published on host so remote tailnet devices can reach it (OpenClaude install,
    # external MCP clients like Cursor). Backend services still address it as
    # http://mcp-gateway:8811 over the docker network.
    ports:
      - "${MCP_GATEWAY_PORT:-8811}:8811"
    healthcheck:
      # Verify gateway is listening AND has loaded its tool catalog (tools/list returns >0 tools).
      # Falls back to port check if curl is unavailable.
      test: ["CMD-SHELL", "sh /mcp-scripts/healthcheck.sh"]
      start_period: 60s
      interval: 15s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # Barrier: model-gateway + MCP reachable (dashboard /api/orchestration/readiness) before OpenClaw jobs.
  wait-orchestration:
    image: curlimages/curl:8.10.1
    restart: "no"
    depends_on:
      dashboard:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
      model-gateway:
        condition: service_healthy
    networks:
      - backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        i=1
        while [ "$$i" -le 72 ]; do
          if curl -sf "http://dashboard:8080/api/orchestration/readiness" >/dev/null; then
            echo "orchestration readiness ok"
            exit 0
          fi
          sleep 5
          i=$$((i+1))
        done
        echo "orchestration readiness timeout"
        exit 1

  openclaw-workspace-sync:
    image: alpine:3
    restart: "no"
    environment:
      - OPENCLAW_SKIP_TOOLS_MD_UPGRADE=${OPENCLAW_SKIP_TOOLS_MD_UPGRADE:-0}
    volumes:
      - ${BASE_PATH:-.}/openclaw/workspace:/templates:ro
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/workspace
      # Full config tree so we can chown agents/, canvas/, etc. (gateway runs as uid 1000)
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/openclaw-config
      - ${BASE_PATH:-.}/openclaw/scripts/workspace_sync_upgrade_tools.sh:/upgrade-tools.sh:ro
    # Markdown: copy only if missing (preserves operator edits in data/). Always refresh health_check.sh only.
    # TOOLS.md: replace stale short stubs with TOOLS.md.example (see /upgrade-tools.sh). Set OPENCLAW_SKIP_TOOLS_MD_UPGRADE=1 to skip.
    entrypoint:
      - /bin/sh
      - -c
      - |
        for f in SOUL.md AGENTS.md TOOLS.md MEMORY.md USER.md IDENTITY.md HEARTBEAT.md; do
          if [ ! -f "/workspace/$$f" ]; then
            if [ -f "/templates/$$f" ]; then cp "/templates/$$f" "/workspace/"
            elif [ -f "/templates/$$f.example" ]; then cp "/templates/$$f.example" "/workspace/$$f"
            fi
          fi
        done
        sh /upgrade-tools.sh
        cp -f /templates/health_check.sh /workspace/ 2>/dev/null || true
        # Gateway runs as uid 1000 (node); both mounts must be writable.
        chown -R 1000:1000 /workspace 2>/dev/null || true
        # Config tree also needs write access for agents/, canvas/, auth-profiles, etc.
        chown -R 1000:1000 /openclaw-config 2>/dev/null || true
    networks:
      - frontend

  openclaw-config-sync:
    image: python:3.12-alpine
    restart: "no"
    depends_on:
      model-gateway:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - MODEL_GATEWAY_URL=http://model-gateway:11435
      - LLAMACPP_MODEL=${LLAMACPP_MODEL:-}
      - LLAMACPP_CTX_SIZE=${LLAMACPP_CTX_SIZE:-262144}
      - OPENCLAW_CONTEXT_WINDOW=${OPENCLAW_CONTEXT_WINDOW:-${LLAMACPP_CTX_SIZE:-262144}}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-local}
      # Comma-separated Discord guild snowflake IDs → channels.discord.guilds (required for allowlist policy)
      - OPENCLAW_DISCORD_GUILD_IDS=${OPENCLAW_DISCORD_GUILD_IDS:-}
      # Optional comma-separated Discord user snowflake IDs → each allowed guild's users allowlist
      - OPENCLAW_DISCORD_USER_IDS=${OPENCLAW_DISCORD_USER_IDS:-}
      # Permissive exec + elevated in gateway container (see overrides/openclaw-gateway-root.yml for root)
      - OPENCLAW_UNRESTRICTED_GATEWAY_CONTAINER=${OPENCLAW_UNRESTRICTED_GATEWAY_CONTAINER:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/config
      - ${BASE_PATH:-.}/openclaw/scripts:/scripts:ro
      - ${GGUF_MODELS_DIR:-${BASE_PATH:-.}/models/gguf}:/gguf-models:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        python3 /scripts/merge_gateway_config.py
        python3 /scripts/normalize_cron_jobs.py
    networks:
      - frontend

  # Install MCP bridge plugin (optional; npm package v0.1.0 has manifest bug — we use
  # plugin-config instead). Run manually: docker compose run --rm openclaw-plugin-install
  openclaw-plugin-install:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.1}
    restart: "no"
    profiles:
      - openclaw-setup
    depends_on:
      openclaw-config-sync:
        condition: service_completed_successfully
    environment:
      HOME: /home/node
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
    command:
      - node
      - /app/dist/index.js
      - plugins
      - install
      - openclaw-mcp-bridge
    networks:
      - frontend

  # Ensure MCP plugin is installed (npm package + manifest) and config entry exists.
  # Uses named volume for proper Linux permissions (Windows bind mounts force 0777).
  openclaw-plugin-config:
    image: node:22-alpine
    restart: "no"
    depends_on:
      openclaw-config-sync:
        condition: service_completed_successfully
      mcp-gateway:
        condition: service_started
    environment:
      - MCP_GATEWAY_URL=http://mcp-gateway:${MCP_GATEWAY_PORT:-8811}/mcp
      - OPENCLAW_MCP_CONNECT_TIMEOUT_MS=${OPENCLAW_MCP_CONNECT_TIMEOUT_MS:-10000}
      - OPENCLAW_MCP_REQUEST_TIMEOUT_MS=${OPENCLAW_MCP_REQUEST_TIMEOUT_MS:-900000}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/config
      - openclaw-extensions:/extensions
      - ${BASE_PATH:-.}/openclaw/scripts:/scripts:ro
      # Forked MCP bridge (namespaced tools as first-class OpenClaw tools); see openclaw/extensions/openclaw-mcp-bridge/README-ORDO-AI-STACK.md
      - ${BASE_PATH:-.}/openclaw/extensions/openclaw-mcp-bridge:/fork-openclaw-mcp-bridge:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache git >/dev/null 2>&1 || true
        PLUGIN_DIR=/extensions/openclaw-mcp-bridge
        MANIFEST="$$PLUGIN_DIR/openclaw.plugin.json"
        MCP_URL="$${MCP_GATEWAY_URL:-http://mcp-gateway:8811/mcp}"
        MCP_CONNECT_TIMEOUT_MS="$${OPENCLAW_MCP_CONNECT_TIMEOUT_MS:-10000}"
        MCP_REQUEST_TIMEOUT_MS="$${OPENCLAW_MCP_REQUEST_TIMEOUT_MS:-900000}"

        # Prefer Ordo AI Stack fork (registers namespaced MCP tools); else npm pack upstream
        if [ -f /fork-openclaw-mcp-bridge/dist/index.js ]; then
          echo "Installing Ordo AI Stack forked openclaw-mcp-bridge from repo..."
          rm -rf "$$PLUGIN_DIR"
          mkdir -p "$$PLUGIN_DIR"
          cp -a /fork-openclaw-mcp-bridge/. "$$PLUGIN_DIR/"
          cd "$$PLUGIN_DIR"
          if [ ! -d "$$PLUGIN_DIR/node_modules/@sinclair/typebox" ]; then
            npm install --omit=dev --ignore-scripts 2>&1
          fi
          echo "Forked plugin installed."
        elif [ ! -f "$$PLUGIN_DIR/dist/index.js" ]; then
          echo "Installing openclaw-mcp-bridge npm package..."
          cd /tmp
          npm pack openclaw-mcp-bridge 2>/dev/null
          tar xzf openclaw-mcp-bridge-*.tgz
          rm -rf "$$PLUGIN_DIR"
          mkdir -p "$$PLUGIN_DIR"
          cp -r package/* "$$PLUGIN_DIR/"
          cd "$$PLUGIN_DIR"
          if [ ! -d "$$PLUGIN_DIR/node_modules/@sinclair/typebox" ]; then
            npm install --omit=dev --ignore-scripts 2>&1
          fi
          echo "Plugin package installed."
        fi

        # OpenClaw blocks world-writable extension paths (npm on Docker volume often yields 777)
        if [ -d "$$PLUGIN_DIR" ]; then
          chown -R 0:0 "$$PLUGIN_DIR" 2>/dev/null || true
          chmod -R go-w "$$PLUGIN_DIR" 2>/dev/null || true
        fi

        # Create/update manifest (npm package v0.1.0 omits it)
        cat > "$$MANIFEST" <<'MEOF'
        {
          "id": "openclaw-mcp-bridge",
          "name": "MCP Client",
          "description": "Bridges MCP servers as native OpenClaw tools via streamable-http.",
          "extensions": ["./dist/index.js"],
          "slots": ["tool"],
          "skills": ["./skills"],
          "configSchema": {
            "type": "object",
            "properties": {
              "servers": {
                "type": "object",
                "additionalProperties": {
                  "type": "object",
                  "properties": {
                    "url": { "type": "string" },
                    "enabled": { "type": "boolean" },
                    "apiKey": { "type": "string" },
                    "toolPrefix": { "type": "string" },
                    "connectTimeoutMs": { "type": "number" },
                    "requestTimeoutMs": { "type": "number" }
                  },
                  "required": ["url"]
                }
              },
              "debug": { "type": "boolean" },
              "flatTools": { "type": "boolean", "default": false },
              "injectSchemas": { "type": "boolean", "default": false }
            }
          }
        }
        MEOF
        chmod 644 "$$MANIFEST"
        echo "Plugin manifest ready."

        # Add plugin entry to openclaw.json if missing
        CONFIG=/config/openclaw.json
        if [ -f "$$CONFIG" ]; then
          if ! node -e "
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('$$CONFIG','utf-8'));
            const p = d.plugins = d.plugins || {};
            const e = p.entries = p.entries || {};
            if (e['openclaw-mcp-bridge']) { process.exit(0); }
            e['openclaw-mcp-bridge'] = {
              enabled:true,
              config:{
                servers:{
                  gateway:{
                    url:'$$MCP_URL',
                    connectTimeoutMs:Number('$$MCP_CONNECT_TIMEOUT_MS'),
                    requestTimeoutMs:Number('$$MCP_REQUEST_TIMEOUT_MS')
                  }
                },
                debug:false,
                flatTools:false,
                injectSchemas:false
              }
            };
            p.enabled = true;
            fs.writeFileSync('$$CONFIG', JSON.stringify(d,null,2));
            console.log('add_mcp_plugin_config: added openclaw-mcp-bridge to plugins.entries');
          "; then
            echo "Warning: could not update openclaw.json plugin entry"
          fi
        fi
    networks:
      - frontend
      - backend

  openclaw-gateway:
    # Pin to digest when available; only :latest published upstream
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.1}
    # Windows bind-mounted OpenClaw state regularly trips EACCES for the node user.
    # Run as root so channel runtimes and model/session state can write reliably.
    user: "0:0"
    # No fixed container_name — same rationale as mcp-gateway / comfyui on shared Docker hosts.
    depends_on:
      model-gateway:
        condition: service_healthy
      mcp-gateway:
        # service_healthy = tool catalog loaded (not just port open).
        # Prevents the MCP bridge from racing against gateway server loading.
        condition: service_healthy
      openclaw-workspace-sync:
        condition: service_completed_successfully
      openclaw-config-sync:
        condition: service_completed_successfully
      openclaw-plugin-config:
        condition: service_completed_successfully
      wait-orchestration:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      OPENCLAW_SKIP_SERVICE_CHECK: "true"
      OPENCLAW_GATEWAY_BIND: "lan"
      # OpenClaw upstream default listen port is 18789; stack + healthcheck expect 6680
      OPENCLAW_GATEWAY_PORT: "6680"
      # Both names so openclaw.json SecretRef id can be DISCORD_BOT_TOKEN or DISCORD_TOKEN (OpenClaw env ref).
      DISCORD_BOT_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # For agent to download ComfyUI models via dashboard API (Option B)
      DASHBOARD_URL: http://dashboard:8080
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-}
      OPS_CONTROLLER_TOKEN: ${OPS_CONTROLLER_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/home/node/.openclaw/workspace
      # MCP config so agent can read data/mcp/servers.txt (cron job, TOOLS.md)
      - ${BASE_PATH:-.}/data/mcp:/home/node/.openclaw/workspace/data/mcp
      # Named volume for extensions — Windows bind mounts force 0777 which
      # OpenClaw's safe-open rejects. A named volume has proper Linux perms.
      - openclaw-extensions:/home/node/.openclaw/extensions
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-6680}:6680"
      - "${OPENCLAW_BRIDGE_PORT:-6681}:6681"
      # UI port maps to socat proxy (6685) which forwards to OpenClaw's loopback-only UI (127.0.0.1:6682)
      - "${OPENCLAW_UI_PORT:-6682}:6685"
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    healthcheck:
      # Inside the container OpenClaw listens on 6680 (host port is the left side of ports: … :6680).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:6680"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Official image ENTRYPOINT is `node`; subcommands go through dist/index.js (not bare `gateway`).
    command:
      - node
      - /app/dist/index.js
      - gateway
      - --bind
      - ${OPENCLAW_GATEWAY_BIND:-lan}
      - --port
      - "6680"
      - --allow-unconfigured
    networks:
      - frontend
      - backend

  # Socat proxy: OpenClaw's browser UI binds to 127.0.0.1:6682 (loopback-only) inside the container,
  # so Docker port forwarding can't reach it. This sidecar shares the network namespace and bridges
  # 0.0.0.0:6685 -> 127.0.0.1:6682, allowing the openclaw-gateway port mapping above to work.
  openclaw-ui-proxy:
    image: alpine/socat:1.8.0.0
    network_mode: "service:openclaw-gateway"
    command: TCP-LISTEN:6685,fork,reuseaddr TCP:127.0.0.1:6682
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  openclaw-cli:
    profiles: [openclaw-cli]
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.1}
    depends_on:
      - llamacpp
      - openclaw-gateway
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      BROWSER: echo
      OPENAI_API_KEY: "${LITELLM_MASTER_KEY:-local}"
      OPENAI_BASE_URL: "http://model-gateway:11435/v1"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "/app/dist/index.js"]
    networks:
      - frontend

  openclaude-cli:
    profiles: [openclaude-cli]
    build:
      context: .
      dockerfile: openclaude/Dockerfile
      args:
        OPENCLAUDE_NPM_VERSION: ${OPENCLAUDE_NPM_VERSION:-latest}
    depends_on:
      model-gateway:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      BROWSER: echo
      CLAUDE_CODE_USE_OPENAI: "1"
      OPENAI_API_KEY: ${OPENCLAUDE_OPENAI_API_KEY:-${LITELLM_MASTER_KEY:-local}}
      OPENAI_BASE_URL: http://model-gateway:${MODEL_GATEWAY_PORT:-11435}/v1
      OPENAI_MODEL: ${OPENCLAUDE_MODEL:-${DEFAULT_MODEL:-model.gguf}}
    volumes:
      - ${BASE_PATH:-.}:/workspace
      - ${BASE_PATH:-.}/data/openclaude:/home/node/.claude
    working_dir: /workspace
    stdin_open: true
    tty: true
    init: true
    restart: "no"
    networks:
      - frontend

  # --- RAG ---

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  rag-ingestion:
    profiles: [rag]
    build: ./rag-ingestion
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/rag-ingestion.heartbeat"]
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - MODEL_GATEWAY_URL=http://model-gateway:11435
      - EMBED_MODEL=${EMBED_MODEL:-${LLAMACPP_EMBED_MODEL:-nomic-embed-text-v1.5.Q4_K_M.gguf}}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${RAG_COLLECTION:-documents}
      - WATCH_DIR=/watch
      - CHUNK_SIZE=${RAG_CHUNK_SIZE:-400}
      - CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-50}
      - SCAN_INTERVAL_SEC=${RAG_SCAN_INTERVAL_SEC:-15}
    volumes:
      - ${DATA_PATH:-${BASE_PATH:-.}/data}/rag-input:/watch
    depends_on:
      model-gateway:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

volumes:
  openclaw-extensions:

networks:
  frontend:
    name: ordo-ai-stack-frontend
  backend:
    name: ordo-ai-stack-backend
    # internal: false required for llama.cpp and HuggingFace model downloads.
    # Set internal: true for air-gapped security (model pulls will fail).
    internal: false
