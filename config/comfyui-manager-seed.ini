# Seeded by scripts/ensure_dirs.* on first run (only if config.ini is absent).
# ComfyUI-Manager: Docker uses --listen (non-loopback), which defaults security to
# "normal-" and blocks git URL installs, pip, and many custom-node flows.
# https://docs.comfy.org/manager/configuration
[default]
security_level = weak
network_mode = public
