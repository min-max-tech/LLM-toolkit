# Custom MCP registry — merges with the Docker MCP catalog (override / add servers).
# Template: mcp/gateway/registry-custom.yaml — copied to data/mcp/ by ensure_dirs.
# PLACEHOLDER_* values are replaced at mcp-gateway startup (gateway-wrapper.sh).
#
# Tavily: https://app.tavily.com — set TAVILY_API_KEY in repo root .env (passed into mcp-gateway).
servers:
  duckduckgo:
    image: mcp/duckduckgo
  tavily:
    image: mcp/tavily
    env:
      TAVILY_API_KEY: PLACEHOLDER_TAVILY_API_KEY
  comfyui:
    image: ai-toolkit-comfyui-mcp:latest
    env:
      COMFYUI_URL: http://comfyui:8188
      OPS_CONTROLLER_URL: http://ops-controller:9000
      OPS_CONTROLLER_TOKEN: PLACEHOLDER_OPS_CONTROLLER_TOKEN
